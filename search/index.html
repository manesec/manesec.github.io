<script>
var click_clear_count = 0;
function clearText(){
    if (document.getElementById("searchbar").value.trim() == ""){
        click_clear_count ++;
    }else{
        click_clear_count = 0;
        var obj = document.getElementById('clearButton');
        obj.innerText = "Clear";
    }

    if (click_clear_count > 5){
        var obj = document.getElementById('clearButton');
        obj.innerText = "QAQ";

    }

    if (click_clear_count > 10){
        var obj = document.getElementById('clearButton');
        obj.style.visibility = 'hidden';
    }
    document.getElementById("searchbar").value="";
}

var click_search_count = 0;
document.getElementById("searchbar")
    .addEventListener("keydown", function(event) {
    if (event.keyCode === 13) {
        event.preventDefault();
        onSearch();
    }
});

function onSearch(){
    if (document.getElementById("searchbar").value.trim() == ""){

        if (click_search_count > 2){
            var obj = document.getElementById('searchButton');
            obj.innerText = "???"
        }

        if (click_search_count > 5){
            var obj = document.getElementById('searchButton');
            obj.innerText = "???????"
        }

        if (click_search_count > 8){
            var obj = document.getElementById('searchButton');
            obj.innerText = "??????????"
        }

        if (click_search_count > 10){
            var obj = document.getElementById('searchButton');
            obj.disabled = true
            obj.innerText = "..."
            window.location = "https://google.com";
        }

        click_search_count ++;
        return;
    }
    click_search_count = 0;
    var obj = document.getElementById('searchButton');
    obj.innerText = "Search"
    var searchUrl = "https://duckduckgo.com/?q=site%3Amanesec.github.io+" + encodeURI(document.getElementById("searchbar").value);
    window.open(searchUrl,'_blank');

}

</script>
